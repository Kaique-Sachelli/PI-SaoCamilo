<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Font Awesome (para ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Conexão CSS -->
    <link rel="stylesheet" href="../CSS/login.css">

</head>
<body>
    <div class="logo">
        <img src="../img/Logo_sao_camilo.png" alt="Logo São Camilo">
    </div>

    <div class="container-principal mt-2 p-5">
        <div class="row">
            <div class="container-login col-xl-4 col-lg-6 col-md-8 col-sm-12">

                <h1 class="titulo">LOGIN</h1>

                <!-- EMAIL -->
                <input type="email" class="email" id="emailLogin" placeholder="E-mail:">

                <!-- SENHA + ÍCONE -->
                <div class="mostrar-container">

                    <input type="password" class="mostrar" id="senhaLogin" placeholder="Senha:">

                    <i class="fa-solid fa-eye toggle-senha" onclick="toggleSenha()"></i>
                </div>

                <a href="#" class="esqueci-senha" id="esqueciSenhaLink">Esqueci minha senha?</a>


                <!-- Botão -->
                <button class="botao-entrar" id="botaoLogin">
                Entrar
                </button>

            </div>
        </div>

        <div class="signup-container">
            <span>Não possui conta?</span>
            <a href="#" class="criar-conta-link" id="criarContaLink">Criar conta</a>
        </div>
    </div>


    <!-- <script src="https://app.embed.im/accessibility.js" defer></script> -->
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

    <div id="modal-senha" class="modal-senha" aria-hidden="true">
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalSenhaTitulo">
        <button type="button" class="modal-close" id="modalCloseBtn" aria-label="Fechar">×</button>
        <h2 id="modalSenhaTitulo">Senha</h2>
        <p>Para redefinir sua senha, entre em contato com o suporte ou use o sistema de recuperação.</p>
      </div>
    </div>

    <div id="modal-cadastro" class="modal-cadastro" aria-hidden="true">
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalCadastroTitulo">
        <button type="button" class="modal-close" id="modalCadastroCloseBtn" aria-label="Fechar">×</button>
        
        <h2 id="modalCadastroTitulo">Criar conta</h2>
        
        <form class="modal-form" autocomplete="off">
          <label for="cadastroNome">Nome</label>
          <input type="text" id="cadastroNome" class="modal-input" placeholder="Nome completo" required>

          <label for="cadastroEmailCpf">E-mail</label>
          <input type="email" id="cadastroEmailCpf" class="modal-input" placeholder="E-mail:" required>

          <label for="cadastroSenha">Senha</label>
          <input type="password" id="cadastroSenha" class="modal-input" placeholder="Senha:" required>

          <button type="button" class="modal-submit" id="modalCadastroSubmit">Criar conta</button>
        </form>

      </div>
    </div>

    <script>
      const esqueciSenhaLink = document.getElementById('esqueciSenhaLink');
      const modalSenha = document.getElementById('modal-senha');
      const modalCloseBtn = document.getElementById('modalCloseBtn');
      const criarContaLink = document.getElementById('criarContaLink');
      const modalCadastro = document.getElementById('modal-cadastro');
      const modalCadastroCloseBtn = document.getElementById('modalCadastroCloseBtn');

      esqueciSenhaLink.addEventListener('click', function(event) {
        event.preventDefault();
        modalSenha.classList.add('show');
        modalSenha.setAttribute('aria-hidden', 'false');
      });

      modalCloseBtn.addEventListener('click', function() {
        modalSenha.classList.remove('show');
        modalSenha.setAttribute('aria-hidden', 'true');
      });

      modalSenha.addEventListener('click', function(event) {
        if (event.target === modalSenha) {
          modalSenha.classList.remove('show');
          modalSenha.setAttribute('aria-hidden', 'true');
        }
      });

      criarContaLink.addEventListener('click', function(event) {
        event.preventDefault();
        modalCadastro.classList.add('show');
        modalCadastro.setAttribute('aria-hidden', 'false');
      });

      modalCadastroCloseBtn.addEventListener('click', function() {
        modalCadastro.classList.remove('show');
        modalCadastro.setAttribute('aria-hidden', 'true');
      });

      modalCadastro.addEventListener('click', function(event) {
        if (event.target === modalCadastro) {
          modalCadastro.classList.remove('show');
          modalCadastro.setAttribute('aria-hidden', 'true');
        }
      });
    </script>
</body>
</html>
